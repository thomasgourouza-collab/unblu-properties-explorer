<main class="container-fluid app-shell py-3 px-3 px-lg-4">
  <section class="app-header mb-2">
    <div class="title-row">
      <img src="search.png" alt="Search logo" class="title-logo" />
      <h1 class="h3 mb-0">Unblu Properties Explorer</h1>
    </div>
  </section>

  <section class="card shadow-sm upload-card mb-3">
    <div class="card-body py-2">
      <div
        class="upload-zone"
        *ngIf="!currentFileName"
        [class.dragging]="isDragging"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event)"
      >
        <div class="upload-inline">
          <label for="csvUpload" class="btn btn-sm btn-light choose-csv-btn" [class.disabled]="isParsing">
            Upload
          </label>
          <span class="upload-inline-text"> or drop a CSV file here.</span>
        </div>
        <input
          id="csvUpload"
          type="file"
          class="visually-hidden"
          accept=".csv,text/csv"
          (change)="onFileSelected($event)"
          [disabled]="isParsing"
        />
      </div>

      <div class="d-flex flex-wrap align-items-center gap-2 mt-2 loaded-meta" *ngIf="currentFileName">
        <span class="badge text-bg-primary">{{ currentFileName }}</span>
        <span class="text-muted small">{{ rows.length }} parsed rows</span>
        <button type="button" class="btn btn-sm btn-outline-danger" (click)="resetData()">Clear data</button>
      </div>

      <div class="alert alert-info mt-2 mb-0 loading-alert py-2 px-3" *ngIf="isParsing">
        <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
        <span>Parsing CSV file...</span>
      </div>
      <div class="alert alert-danger mt-2 mb-0 py-2 px-3" *ngIf="parseError">{{ parseError }}</div>

      <div class="alert alert-warning mt-2 mb-0 py-2 px-3" *ngIf="parseWarnings.length > 0">
        <strong>Parsing warnings:</strong>
        <ul class="mb-0 mt-2">
          <li *ngFor="let warning of parseWarnings">{{ warning }}</li>
        </ul>
      </div>
    </div>
  </section>

  <app-config-table *ngIf="rows.length > 0" [rows]="rows" />
</main>
