<section class="table-toolbar mb-2">
  <div class="toolbar-single-row">
    <div class="toolbar-global-third">
      <input
        id="globalFilterInput"
        type="text"
        class="form-control form-control-sm"
        placeholder="Global filter..."
        [(ngModel)]="globalFilter"
        (ngModelChange)="onFiltersChanged()"
      />
    </div>
    <div class="toolbar-chips-two-thirds">
      <ng-container *ngIf="hasActiveFilters; else noFiltersTemplate">
        <div class="chips-scroll-area">
          <button
            type="button"
            class="filter-chip"
            *ngFor="let chip of activeFilterChips"
            (click)="removeFilterChip(chip)"
            [title]="'Remove ' + chip.label"
          >
            <span>{{ chip.label }}</span>
            <i class="pi pi-times" aria-hidden="true"></i>
          </button>
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary chips-clear-btn" (click)="clearAllFilters()">
          Clear all
        </button>
      </ng-container>
      <ng-template #noFiltersTemplate>
        <span class="no-filters-label">No active filters</span>
      </ng-template>
    </div>
  </div>
</section>

<section class="card shadow-sm">
  <div class="card-body p-0">
    <p-table
      [value]="filteredRows"
      [columns]="visibleColumns"
      [paginator]="true"
      [rows]="rowsPerPage"
      [sortMode]="'multiple'"
      [reorderableColumns]="true"
      [scrollable]="true"
      [showCurrentPageReport]="false"
      scrollHeight="70vh"
      (onColReorder)="onColumnReorder($event)"
    >
      <ng-template pTemplate="header" let-columns>
        <tr class="columns-row">
          <th
            *ngFor="let column of columns"
            scope="col"
            [pSortableColumn]="column.key"
            pReorderableColumn
            class="header-cell"
          >
            <div class="header-content">
              <span>{{ column.label }}</span>
              <p-sortIcon [field]="column.key" />
            </div>
          </th>
        </tr>
        <tr class="filters-row">
          <th *ngFor="let column of columns" scope="col" class="filter-header-cell">
            <ng-container [ngSwitch]="column.filterType">
              <input
                *ngSwitchCase="'text'"
                type="text"
                class="form-control form-control-sm header-filter-input"
                placeholder="Contains..."
                [ngModel]="getTextFilter(column.key)"
                (ngModelChange)="setTextFilter(column.key, $event)"
              />

              <p-multiselect
                *ngSwitchCase="'select'"
                [options]="getFilterOptions(column.key)"
                [filter]="true"
                [showToggleAll]="true"
                [appendTo]="'body'"
                [display]="'chip'"
                [maxSelectedLabels]="1"
                defaultLabel="All"
                styleClass="header-filter-select"
                [ngModel]="getValueFilter(column.key)"
                (ngModelChange)="setValueFilter(column.key, $event)"
              />

              <div *ngSwitchCase="'list'" class="list-header-filter">
                <p-multiselect
                  [options]="getFilterOptions(column.key)"
                  [filter]="true"
                  [showToggleAll]="true"
                  [appendTo]="'body'"
                  [display]="'chip'"
                  [maxSelectedLabels]="1"
                  defaultLabel="All"
                  styleClass="header-filter-select"
                  [ngModel]="getValueFilter(column.key)"
                  (ngModelChange)="setValueFilter(column.key, $event)"
                />
                <div class="mode-toggle">
                  <input
                    class="btn-check"
                    type="radio"
                    [id]="column.key + '-or'"
                    [name]="column.key + '-mode'"
                    value="or"
                    [ngModel]="getListMode(column.key)"
                    (ngModelChange)="setListMode(column.key, $event)"
                  />
                  <label class="btn btn-outline-secondary btn-xs" [for]="column.key + '-or'">OR</label>
                  <input
                    class="btn-check"
                    type="radio"
                    [id]="column.key + '-and'"
                    [name]="column.key + '-mode'"
                    value="and"
                    [ngModel]="getListMode(column.key)"
                    (ngModelChange)="setListMode(column.key, $event)"
                  />
                  <label class="btn btn-outline-secondary btn-xs" [for]="column.key + '-and'">AND</label>
                </div>
              </div>
            </ng-container>
          </th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row let-columns="columns">
        <tr>
          <td *ngFor="let column of columns">
            <ng-container *ngIf="column.key === 'defaultValue'; else plainCell">
              <span>{{ row[column.key] }}</span>
              <span
                class="color-swatch"
                *ngIf="getRgbaColor(row[column.key]) as rgbaColor"
                [style.backgroundColor]="rgbaColor"
                [title]="rgbaColor"
                aria-label="Detected RGBA color"
              ></span>
            </ng-container>
            <ng-template #plainCell>
              {{ row[column.key] }}
            </ng-template>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage" let-columns>
        <tr>
          <td [attr.colspan]="columns.length" class="text-center py-4">
            No rows match your current filters.
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="paginatorleft" let-state>
        <div class="paginator-left-report">
          Showing {{ state.first + 1 }} to {{ state.first + state.rows > state.totalRecords ? state.totalRecords : state.first + state.rows }} of {{ state.totalRecords }} rows
        </div>
      </ng-template>
      <ng-template pTemplate="paginatorright">
        <div class="paginator-right-select">
          <select
            class="form-select form-select-sm rows-select"
            [ngModel]="rowsPerPage"
            (ngModelChange)="onRowsPerPageChange($event)"
          >
            <option *ngFor="let option of rowsPerPageOptions" [value]="option">{{ option }}</option>
          </select>
        </div>
      </ng-template>
    </p-table>
  </div>
</section>
