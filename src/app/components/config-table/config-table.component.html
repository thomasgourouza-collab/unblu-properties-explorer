<section class="table-toolbar card shadow-sm mb-3">
  <div class="card-body">
    <div class="toolbar-grid">
      <div class="toolbar-field">
        <label for="globalFilterInput" class="form-label">Global filter</label>
        <input
          id="globalFilterInput"
          type="text"
          class="form-control"
          placeholder="Search in all columns (case-insensitive)"
          [(ngModel)]="globalFilter"
          (ngModelChange)="onFiltersChanged()"
        />
      </div>
      <div class="toolbar-field">
        <label for="columnVisibility" class="form-label">Visible columns</label>
        <p-multiselect
          inputId="columnVisibility"
          [options]="columnVisibilityOptions"
          [showToggleAll]="true"
          [display]="'chip'"
          [filter]="true"
          [appendTo]="'body'"
          placeholder="Choose columns"
          [(ngModel)]="visibleColumnKeys"
          (onChange)="onColumnVisibilityChange()"
        />
      </div>
      <div class="toolbar-actions">
        <button type="button" class="btn btn-outline-secondary" (click)="clearFilters()">Reset filters</button>
      </div>
    </div>
  </div>
</section>

<section class="filters card shadow-sm mb-3">
  <div class="card-body">
    <div class="filters-grid">
      <div class="filter-item" *ngFor="let column of columns">
        <label class="form-label">{{ column.label }}</label>

        <ng-container [ngSwitch]="column.filterType">
          <input
            *ngSwitchCase="'text'"
            type="text"
            class="form-control form-control-sm"
            placeholder="Contains..."
            [(ngModel)]="textFilters[column.key]"
            (ngModelChange)="onFiltersChanged()"
          />

          <p-multiselect
            *ngSwitchCase="'select'"
            [options]="filterOptions[column.key] ?? []"
            [filter]="true"
            [showToggleAll]="true"
            [appendTo]="'body'"
            [display]="'chip'"
            [maxSelectedLabels]="2"
            defaultLabel="All"
            [(ngModel)]="valueFilters[column.key]"
            (onChange)="onFiltersChanged()"
          />

          <div *ngSwitchCase="'list'" class="list-filter">
            <p-multiselect
              [options]="filterOptions[column.key] ?? []"
              [filter]="true"
              [showToggleAll]="true"
              [appendTo]="'body'"
              [display]="'chip'"
              [maxSelectedLabels]="2"
              defaultLabel="All"
              [(ngModel)]="valueFilters[column.key]"
              (onChange)="onFiltersChanged()"
            />
            <div class="btn-group btn-group-sm mt-2">
              <input
                class="btn-check"
                type="radio"
                [id]="column.key + '-or'"
                [name]="column.key + '-mode'"
                value="or"
                [ngModel]="getListMode(column.key)"
                (ngModelChange)="setListMode(column.key, $event)"
              />
              <label class="btn btn-outline-secondary" [for]="column.key + '-or'">OR</label>

              <input
                class="btn-check"
                type="radio"
                [id]="column.key + '-and'"
                [name]="column.key + '-mode'"
                value="and"
                [ngModel]="getListMode(column.key)"
                (ngModelChange)="setListMode(column.key, $event)"
              />
              <label class="btn btn-outline-secondary" [for]="column.key + '-and'">AND</label>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</section>

<section class="card shadow-sm">
  <div class="card-body p-0">
    <p-table
      [value]="filteredRows"
      [columns]="visibleColumns"
      [paginator]="true"
      [rows]="25"
      [rowsPerPageOptions]="[10, 25, 50, 100]"
      [sortMode]="'multiple'"
      [reorderableColumns]="true"
      [scrollable]="true"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} rows"
      scrollHeight="70vh"
      (onColReorder)="onColumnReorder($event)"
    >
      <ng-template pTemplate="header" let-columns>
        <tr>
          <th
            *ngFor="let column of columns"
            [pSortableColumn]="column.key"
            pReorderableColumn
            class="header-cell"
          >
            <div class="header-content">
              <span>{{ column.label }}</span>
              <p-sortIcon [field]="column.key" />
            </div>
          </th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row let-columns="columns">
        <tr>
          <td *ngFor="let column of columns">{{ row[column.key] }}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage" let-columns>
        <tr>
          <td [attr.colspan]="columns.length" class="text-center py-4">
            No rows match your current filters.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</section>
